<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Lakán - DLSU-D Navigator</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --dlsu-green: #006341;
            --dlsu-green-dark: #004d32;
            --dlsu-green-light: #00854d;
            --accent-blue: #3b82f6;
            --bg-gray: #f9fafb;
            --border-gray: #e5e7eb;
            --text-dark: #1f2937;
            --text-light: #6b7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-gray);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--dlsu-green) 0%, var(--dlsu-green-dark) 100%);
            color: white;
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 1000;
            position: relative;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-subtitle {
            font-size: 11px;
            opacity: 0.9;
            margin-top: 2px;
        }

        .menu-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .menu-btn:active {
            background: rgba(255,255,255,0.25);
        }

        /* Map Container */
        #map-container {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        /* Chat Overlay */
        .chat-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            z-index: 2000;
            transform: translateY(calc(100% - 80px));
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 70vh;
            display: flex;
            flex-direction: column;
        }

        .chat-overlay.expanded {
            transform: translateY(0);
        }

        .chat-handle {
            width: 40px;
            height: 4px;
            background: var(--border-gray);
            border-radius: 2px;
            margin: 12px auto 8px;
            cursor: pointer;
        }

        .chat-header {
            padding: 0 16px 12px;
            border-bottom: 1px solid var(--border-gray);
            cursor: pointer;
        }

        .chat-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-status {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: var(--bg-gray);
            -webkit-overflow-scrolling: touch;
        }

        .message {
            margin-bottom: 12px;
            padding: 12px 14px;
            border-radius: 16px;
            max-width: 85%;
            line-height: 1.5;
            font-size: 15px;
            word-wrap: break-word;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background: linear-gradient(135deg, var(--dlsu-green) 0%, var(--dlsu-green-light) 100%);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: white;
            color: var(--text-dark);
            border: 1px solid var(--border-gray);
            border-bottom-left-radius: 4px;
        }

        /* Input Area */
        .input-area {
            padding: 12px 16px;
            background: white;
            border-top: 1px solid var(--border-gray);
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        #user-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border-gray);
            border-radius: 24px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
            outline: none;
            transition: border-color 0.2s;
        }

        #user-input:focus {
            border-color: var(--dlsu-green);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--dlsu-green) 0%, var(--dlsu-green-dark) 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Quick Actions */
        .quick-actions {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1500;
        }

        .action-btn {
            width: 48px;
            height: 48px;
            background: white;
            border: none;
            border-radius: 50%;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn.active {
            background: var(--dlsu-green);
            color: white;
        }

        /* Loading indicator */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 4px;
            padding: 12px 14px;
            background: white;
            border: 1px solid var(--border-gray);
            border-radius: 16px;
            width: fit-content;
            margin-bottom: 12px;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-light);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-4px);
            }
        }

        /* Welcome screen */
        .welcome-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 20px;
            animation: fadeIn 0.3s;
        }

        .welcome-screen.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .welcome-content {
            background: white;
            padding: 32px 24px;
            border-radius: 20px;
            text-align: center;
            max-width: 340px;
            animation: slideUpScale 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUpScale {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .welcome-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--dlsu-green);
            margin-bottom: 8px;
        }

        .welcome-subtitle {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .welcome-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--dlsu-green) 0%, var(--dlsu-green-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .welcome-btn:active {
            transform: scale(0.98);
        }

        /* Responsive - Landscape */
        @media (orientation: landscape) and (max-height: 500px) {
            .chat-overlay {
                transform: translateY(calc(100% - 60px));
                max-height: 60vh;
            }
            
            .header {
                padding: 8px 16px;
            }
            
            .header-title {
                font-size: 18px;
            }
            
            .header-subtitle {
                display: none;
            }
        }

        /* Desktop/Tablet view */
        @media (min-width: 768px) {
            .app-container {
                flex-direction: row;
            }

            .chat-overlay {
                position: relative;
                width: 400px;
                max-height: 100vh;
                transform: none;
                border-radius: 0;
                box-shadow: -2px 0 20px rgba(0,0,0,0.1);
            }

            .chat-handle {
                display: none;
            }

            .quick-actions {
                top: 80px;
                right: 420px;
            }
        }

        /* Hide scrollbar but keep functionality */
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border-gray);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <div>
                    <div class="header-title">
                        Lakan Navigator
                    </div>
                    <div class="header-subtitle">DLSU-Dasmarinas Campus Guide</div>
                </div>
            </div>
        </div>

        <!-- Map -->
        <div id="map-container"></div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <button id="gps-btn" class="action-btn" title="GPS Tracking">
                📍
            </button>
            <button id="recenter-btn" class="action-btn" title="Recenter Map">
                🎯
            </button>
        </div>

        <!-- Chat Overlay -->
        <div class="chat-overlay" id="chat-overlay">
            <div class="chat-handle" onclick="toggleChat()"></div>
            <div class="chat-header" onclick="toggleChat()">
                <div class="chat-title">
                    Ask Lakan
                    <span style="font-size: 14px;">▲</span>
                </div>
                <div class="chat-status" id="chat-status">Ready to help you navigate</div>
            </div>
            
            <div class="chat-messages" id="chat-messages">
                <div class="typing-indicator" id="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
            
            <div class="input-area">
                <textarea 
                    id="user-input" 
                    placeholder="Where do you want to go?"
                    rows="1"
                ></textarea>
                <button class="send-btn" onclick="sendMessage()">
                    ➤
                </button>
            </div>
        </div>

        <!-- Welcome Screen -->
        <div class="welcome-screen" id="welcome-screen">
            <div class="welcome-content">
                <div class="welcome-icon">🗺️</div>
                <div class="welcome-title">Welcome to Lakan!</div>
                <div class="welcome-subtitle">
                    Your AI-powered campus navigation assistant. 
                    Ask me how to get anywhere on campus.
                </div>
                <button class="welcome-btn" onclick="closeWelcome()">
                    Start Navigating
                </button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Your custom scripts -->
    <script src="{{ url_for('static', filename='js/campus_navigation.js') }}"></script>
    <script src="{{ url_for('static', filename='js/map_controller.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main_mobile.js') }}"></script>
    <script src="/static/js/admin_mode.js"></script>

</body>
</html>
