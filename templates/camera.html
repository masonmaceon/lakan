<!-- camera.html - Building Recognition Camera Interface -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lakán - Building Recognition</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dlsu-green: #006341;
            --dlsu-green-dark: #004d32;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            overflow: hidden;
            height: 100vh;
        }

        /* Camera View */
        .camera-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        #camera-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #camera-canvas {
            display: none;
        }

        /* Overlay Guide */
        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        /* Top Header */
        .camera-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
            padding: 12px 16px;
            margin: -20px -20px 0;
            pointer-events: auto;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }

        .camera-title {
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        /* Center Guide Frame */
        .guide-frame {
            position: relative;
            width: 85%;
            max-width: 400px;
            aspect-ratio: 4/3;
            margin: 0 auto;
            border: 3px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            background: rgba(0,0,0,0.1);
        }

        .guide-corners {
            position: absolute;
            inset: -10px;
        }

        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid var(--dlsu-green);
            box-shadow: 0 0 10px rgba(0,99,65,0.5);
        }

        .corner.top-left {
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
            border-radius: 20px 0 0 0;
        }

        .corner.top-right {
            top: 0;
            right: 0;
            border-left: none;
            border-bottom: none;
            border-radius: 0 20px 0 0;
        }

        .corner.bottom-left {
            bottom: 0;
            left: 0;
            border-right: none;
            border-top: none;
            border-radius: 0 0 0 20px;
        }

        .corner.bottom-right {
            bottom: 0;
            right: 0;
            border-left: none;
            border-top: none;
            border-radius: 0 0 20px 0;
        }

        .guide-text {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        /* Bottom Controls */
        .camera-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 100%);
            padding: 30px 20px 40px;
            margin: 0 -20px -20px;
            pointer-events: auto;
        }

        .capture-btn {
            width: 70px;
            height: 70px;
            background: white;
            border: 5px solid var(--dlsu-green);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .capture-btn:active {
            transform: scale(0.95);
        }

        .gallery-btn {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            border-radius: 12px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Result Modal */
        .result-modal {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
        }

        .result-modal.show {
            transform: translateY(0);
        }

        .result-handle {
            width: 40px;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .result-content {
            text-align: center;
        }

        .result-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .result-building {
            font-size: 24px;
            font-weight: 700;
            color: var(--dlsu-green);
            margin-bottom: 8px;
        }

        .result-confidence {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 20px;
        }

        .result-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .action-btn {
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, var(--dlsu-green) 0%, var(--dlsu-green-dark) 100%);
            color: white;
        }

        .action-btn.secondary {
            background: #f3f4f6;
            color: #374151;
        }

        /* Loading State */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            pointer-events: auto;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: var(--dlsu-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 16px;
            font-weight: 500;
        }

        /* File input (hidden) */
        #file-input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="camera-container">
        <!-- Video Stream -->
        <video id="camera-video" autoplay playsinline></video>
        <canvas id="camera-canvas"></canvas>

        <!-- File Input -->
        <input type="file" id="file-input" accept="image/*" capture="environment">

        <!-- Overlay -->
        <div class="camera-overlay">
            <!-- Header -->
            <div class="camera-header">
                <button class="back-btn" onclick="goBack()">✕</button>
                <div class="camera-title">Building Recognition</div>
                <div style="width: 40px;"></div> <!-- Spacer -->
            </div>

            <!-- Guide Frame -->
            <div style="flex: 1; display: flex; align-items: center;">
                <div class="guide-frame">
                    <div class="guide-corners">
                        <div class="corner top-left"></div>
                        <div class="corner top-right"></div>
                        <div class="corner bottom-left"></div>
                        <div class="corner bottom-right"></div>
                    </div>
                    <div class="guide-text">📸 Point camera at building</div>
                </div>
            </div>

            <!-- Controls -->
            <div class="camera-controls">
                <button class="gallery-btn" onclick="openGallery()">🖼️</button>
                <button class="capture-btn" onclick="captureImage()"></button>
                <div style="width: 50px;"></div> <!-- Spacer -->
            </div>
        </div>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-text">Analyzing building...</div>
        </div>

        <!-- Result Modal -->
        <div class="result-modal" id="result-modal">
            <div class="result-handle"></div>
            <div class="result-content">
                <div class="result-icon" id="result-icon">🏫</div>
                <div class="result-building" id="result-building">---</div>
                <div class="result-confidence" id="result-confidence">---</div>
                
                <div class="result-actions">
                    <button class="action-btn primary" onclick="getDirections()">
                        🧭 Get Directions from Here
                    </button>
                    <button class="action-btn secondary" onclick="showOnMap()">
                        🗺️ View on Map
                    </button>
                    <button class="action-btn secondary" onclick="retakePhoto()">
                        📷 Take Another Photo
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let stream = null;
        let lastPrediction = null;

        // Initialize camera on load
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment', // Back camera
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                });
                
                const video = document.getElementById('camera-video');
                video.srcObject = stream;
                
                console.log('✅ Camera initialized');
            } catch (error) {
                console.error('❌ Camera error:', error);
                alert('Could not access camera. Please allow camera permissions.');
            }
        }

        // Capture image from video stream
        async function captureImage() {
            const video = document.getElementById('camera-video');
            const canvas = document.getElementById('camera-canvas');
            const context = canvas.getContext('2d');

            // Set canvas size to video size
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // Draw video frame to canvas
            context.drawImage(video, 0, 0);

            // Convert to blob
            canvas.toBlob(async (blob) => {
                await recognizeBuilding(blob);
            }, 'image/jpeg', 0.95);
        }

        // Open gallery to select image
        function openGallery() {
            document.getElementById('file-input').click();
        }

        // Handle file selection
        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                await recognizeBuilding(file);
            }
        });

        // Send image to backend for recognition
        async function recognizeBuilding(imageBlob) {
            // Show loading
            document.getElementById('loading-overlay').classList.add('show');

            try {
                // Create form data
                const formData = new FormData();
                formData.append('image', imageBlob, 'building.jpg');

                // Send to backend
                const response = await fetch('/recognize-building', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                // Hide loading
                document.getElementById('loading-overlay').classList.remove('show');

                if (response.ok) {
                    showResult(result);
                } else {
                    alert('Recognition failed: ' + result.error);
                }

            } catch (error) {
                console.error('Recognition error:', error);
                document.getElementById('loading-overlay').classList.remove('show');
                alert('Error recognizing building. Please try again.');
            }
        }

        // Display recognition result
        function showResult(result) {
            lastPrediction = result;

            // Update UI
            document.getElementById('result-building').textContent = result.building;
            document.getElementById('result-confidence').textContent = 
                `${(result.confidence * 100).toFixed(1)}% confidence`;

            // Building-specific icons
            const icons = {
                'CEAT': '🏗️',
                'JFH': '🏫',
                'Library': '📚',
                'Square': '🍽️',
                'Admin': '🏛️',
                'CBAA': '💼',
                'CTH': '🎓',
                'CTHM': '🏨'
            };
            document.getElementById('result-icon').textContent = 
                icons[result.building] || '🏫';

            // Show modal
            document.getElementById('result-modal').classList.add('show');
        }

        // Hide result modal
        function hideResult() {
            document.getElementById('result-modal').classList.remove('show');
        }

        // Retake photo
        function retakePhoto() {
            hideResult();
        }

        // Get directions from current building
        function getDirections() {
            if (lastPrediction) {
                // Store current location and redirect to map
                localStorage.setItem('currentLocation', lastPrediction.building);
                localStorage.setItem('showDirectionsPrompt', 'true');
                window.location.href = '/';
            }
        }

        // Show building on map
        function showOnMap() {
            if (lastPrediction) {
                localStorage.setItem('showBuilding', lastPrediction.building);
                window.location.href = '/';
            }
        }

        // Go back to main page
        function goBack() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            window.location.href = '/';
        }

        // Initialize on page load
        initCamera();

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
